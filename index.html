<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamSync — Family Management App</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;color:#1a1a1a;background:#fdf8f5}
.app{display:flex;height:100vh;min-height:640px}
.sidebar{width:196px;min-width:196px;display:flex;flex-direction:column;transition:background 0.3s}
.logo{padding:16px;font-size:17px;font-weight:600;display:flex;align-items:center;gap:9px;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.logo-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center}
nav{flex:1;padding:8px 0;overflow-y:auto}
.ni{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;font-size:13px;transition:background 0.12s;color:inherit;user-select:none}
.ni:hover{background:rgba(0,0,0,0.06)}
.ni.active{color:#fff}
.ni-ic{width:15px;height:15px;flex-shrink:0;opacity:0.65}
.ni.active .ni-ic{filter:brightness(10);opacity:1}
.notif-badge{margin-left:auto;color:#fff;font-size:10px;font-weight:600;min-width:16px;height:16px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 4px;background:#E24B4A}
.sidebar-bottom{padding:12px 14px;border-top:0.5px solid rgba(0,0,0,0.08)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:border-color 0.15s}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:11px 24px;display:flex;justify-content:space-between;align-items:center;background:#fff;border-bottom:0.5px solid #f0d0c0}
.notif-btn{position:relative;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:0.5px solid #f0d0c0;background:#fff}
.notif-btn:hover{background:#fde8de}
.content{flex:1;overflow-y:auto;padding:24px 28px}
.btn{border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity 0.1s}
.btn:hover{opacity:0.88}
.b-orange{background:#D85A30;color:#fff}
.b-teal{background:#0F6E56;color:#fff}
.b-purple{background:#534AB7;color:#fff}
.b-amber{background:#BA7517;color:#fff}
.b-pink{background:#D4537E;color:#fff}
.b-blue{background:#185FA5;color:#fff}
.b-ghost{background:transparent;border:0.5px solid #D85A30;color:#993C1D}
.card{background:#fff;border:0.5px solid #f0d0c0;border-radius:14px;padding:16px}
.pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:500}
.pill-orange{background:#FAECE7;color:#712B13}
.pill-teal{background:#E1F5EE;color:#085041}
.pill-amber{background:#FAEEDA;color:#633806}
.pill-purple{background:#EEEDFE;color:#3C3489}
.pill-pink{background:#FBEAF0;color:#72243E}
.pill-green{background:#EAF3DE;color:#27500A}
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.pbar{height:8px;background:#f0e8e0;border-radius:99px;overflow:hidden;margin:5px 0}
.pf{height:100%;border-radius:99px;transition:width 0.4s}
.sec{font-size:11px;font-weight:600;color:#888;margin-bottom:10px;margin-top:18px;text-transform:uppercase;letter-spacing:0.06em}
.modal-bg{position:fixed;inset:0;background:rgba(40,10,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:440px;border:0.5px solid #f0d0c0;max-height:92vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px;color:#712B13}
.fi{margin-bottom:12px}
.fi label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:500}
.fi input,.fi select,.fi textarea{width:100%;padding:8px 10px;border:0.5px solid #d8c0b0;border-radius:9px;font-size:13px;background:#fff;color:#1a1a1a;outline:none;font-family:inherit}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:#D85A30;box-shadow:0 0 0 2px #FAECE7}
.fi textarea{resize:vertical}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ma{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
.msg-bubble{display:inline-block;padding:7px 12px;border-radius:14px;font-size:13px;max-width:72%}
.recipe-header{background:#D85A30;padding:14px 16px;border-radius:14px 14px 0 0}
.recipe-body{padding:14px 16px;border:0.5px solid #f0d0c0;border-top:none;border-radius:0 0 14px 14px}
.step-num{width:22px;height:22px;border-radius:50%;background:#FAECE7;color:#993C1D;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border:0.5px solid #f0d0c0;border-radius:14px;overflow:hidden;background:#fff}
.cal-hd{text-align:center;padding:9px 4px;font-size:11px;font-weight:600;color:#993C1D;background:#fff5f0;border-bottom:0.5px solid #f0d0c0}
.cal-day{border-right:0.5px solid #f0d0c0;border-bottom:0.5px solid #f0d0c0;min-height:90px;padding:7px 5px}
.cal-day:last-child{border-right:none}
.cal-num{font-size:13px;font-weight:500;margin-bottom:5px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-num.today{background:#D85A30;color:#fff}
.cal-ev{font-size:11px;padding:2px 5px;border-radius:4px;margin-bottom:2px}
.txn-tbl{width:100%;border-collapse:collapse;font-size:13px}
.txn-tbl th{text-align:left;padding:8px 12px;color:#888;font-weight:400;font-size:12px;border-bottom:0.5px solid #f0d0c0}
.txn-tbl td{padding:10px 12px;border-bottom:0.5px solid #f5ece6}
.txn-tbl tr:last-child td{border-bottom:none}
.kids-tabs{display:flex;gap:6px;margin-bottom:18px}
.ktab{padding:7px 16px;border-radius:99px;font-size:13px;cursor:pointer;border:0.5px solid #f0d0c0;background:#fff;color:#666;transition:all 0.15s}
.ktab.active{background:#D85A30;color:#fff;border-color:#D85A30}
.shop-item{background:#fff;border:0.5px solid #f0d0c0;border-radius:12px;padding:14px;text-align:center}
.habit-card{background:#fff;border:0.5px solid #f0d0c0;border-radius:14px;padding:16px}
.doc-card{background:#fff;border:0.5px solid #f0d0c0;border-radius:14px;padding:14px;cursor:pointer;transition:background 0.1s}
.doc-card:hover{background:#fff9f7}
.notif-item{display:flex;gap:12px;padding:12px 16px;border-bottom:0.5px solid #f5e8e0;align-items:flex-start}
.notif-item:last-child{border-bottom:none}
.notif-item.unread{background:#fff9f6}
.ann-card{background:#FAEEDA;border-radius:10px;padding:10px 14px;text-align:center;margin-bottom:8px}
</style>
</head>
<body>

<div class="app" id="app">
<div class="sidebar" id="sidebar-el">
  <div class="logo" id="logo-el">
    <div class="logo-icon" id="logo-icon-el">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
    </div>
    FamSync
  </div>
  <nav id="nav-el"></nav>
  <div class="sidebar-bottom">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div class="av" id="cur-av" style="width:30px;height:30px"></div>
      <div>
        <div style="font-size:13px;font-weight:500" id="cur-name"></div>
        <div style="font-size:11px" id="cur-role"></div>
      </div>
    </div>
    <div style="font-size:11px;margin-bottom:5px;color:#888">Switch user</div>
    <div style="display:flex;gap:6px" id="switcher-el"></div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <span style="font-size:15px;font-weight:600;color:#712B13" id="topbar-title">Dashboard</span>
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:13px;color:#993C1D" id="topbar-date"></span>
      <div class="notif-btn" onclick="nav('notifications')" id="notif-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#993C1D" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <div id="notif-dot" style="width:8px;height:8px;background:#E24B4A;border-radius:50%;position:absolute;top:6px;right:6px"></div>
      </div>
    </div>
  </div>
  <div class="content" id="content-el"></div>
</div>

<div class="modal-bg" id="modal-bg" style="display:none">
  <div class="modal" id="modal-body"></div>
</div>
</div>

function ic(n,sz=15){
  if(!ICONS[n])return '';
  return ICONS[n].replace(/width="15" height="15"/g,`width="${sz}" height="${sz}"`);

function userPoints(name){
  return S.tasks.filter(t=>t.assignee===name&&t.isChore&&t.done).reduce((a,t)=>a+(t.points||0),0);
}

function applyTheme(){
  const u=S.currentUser, isKid=u.role==='kid';
  const sb=document.getElementById('sidebar-el');
  sb.style.background=isKid?u.bg:'#fff5f0';
  sb.style.borderRight=isKid?`0.5px solid ${u.color}33`:'0.5px solid #f0d0c0';
  document.getElementById('logo-el').style.borderBottom=isKid?`0.5px solid ${u.color}33`:'0.5px solid #f0d0c0';
  document.getElementById('logo-icon-el').style.background=isKid?u.accent:'#D85A30';
  document.getElementById('cur-role').style.color=isKid?u.accent:'#993C1D';
}

function renderNav(){
  const u=S.currentUser, pages=u.role==='kid'?KID_PAGES:PARENT_PAGES;
  const unread=S.notifications.filter(n=>n.unread).length;
  document.getElementById('nav-el').innerHTML=pages.map(p=>`
    <div class="ni${S.page===p.id?' active':''}" style="${S.page===p.id?`background:${u.accent}`:''}" onclick="nav('${p.id}')">
      <span class="ni-ic">${ic(p.ic)}</span>${p.label}
      ${p.id==='notifications'&&unread?`<span class="notif-badge">${unread}</span>`:''}
    </div>`).join('');
}

function renderSidebarUser(){
  const u=S.currentUser;
  const av=document.getElementById('cur-av');
  av.textContent=u.initials;
  av.style.cssText=`background:${u.bg};color:${u.color};width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid ${u.accent}`;
  document.getElementById('cur-name').textContent=u.name;
  document.getElementById('cur-role').textContent=u.role==='kid'?`Age ${u.age} · ${userPoints(u.name)} pts`:'Parent';
  document.getElementById('switcher-el').innerHTML=USERS.map(usr=>`
    <div title="Switch to ${usr.name}" onclick="doSwitch('${usr.name}')" style="background:${usr.bg};color:${usr.color};width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;border:2px solid ${usr.name===u.name?u.accent:'transparent'};transition:border-color 0.15s">${usr.initials}</div>`).join('');
  const pages=u.role==='kid'?KID_PAGES:PARENT_PAGES;
  document.getElementById('topbar-title').textContent=pages.find(p=>p.id===S.page)?.label||'Home';
  const d=new Date();
  document.getElementById('topbar-date').textContent=d.toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric'});
  const unread=S.notifications.filter(n=>n.unread).length;
  document.getElementById('notif-dot').style.display=unread?'block':'none';
}

function doSwitch(name){
  const target=USERS.find(u=>u.name===name);
  if(!target)return;
  S.currentUser=target;
  S.page=target.role==='kid'?'kid-myday':'dashboard';
  applyTheme(); renderNav(); renderSidebarUser(); renderPage();
}

function nav(p){
  S.page=p;
  const pages=S.currentUser.role==='kid'?KID_PAGES:PARENT_PAGES;
  document.getElementById('topbar-title').textContent=pages.find(x=>x.id===p)?.label||p;
  renderNav(); renderPage();
}

function exportGroceries(){
  const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday','Any Day'];
  const today=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  let txt=`GROCERY LIST\nExported: ${today}\n${'='.repeat(40)}\n\n`;
  const dayGroups={};
  S.groceries.forEach(g=>{
    const day=g.scheduledDay||'Any Day';
    if(!dayGroups[day])dayGroups[day]=[];
    dayGroups[day].push(g);
  });
  const order=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday','Any Day'];
  order.forEach(day=>{
    if(!dayGroups[day]||!dayGroups[day].length) return;
    txt+=`${day.toUpperCase()}\n${'-'.repeat(20)}\n`;
    const byCat={};
    dayGroups[day].forEach(g=>{if(!byCat[g.category])byCat[g.category]=[];byCat[g.category].push(g);});
    Object.entries(byCat).forEach(([cat,items])=>{
      txt+=`  ${cat}:\n`;
      items.forEach(g=>{txt+=`    ${g.checked?'[x]':'[ ]'} ${g.name}${g.fromMeal?' (from meal plan)':''}\n`;});
    });
    txt+='\n';
  });
  txt+=`${'='.repeat(40)}\nTotal: ${S.groceries.length} items | ${S.groceries.filter(g=>g.checked).length} checked off\n`;
  const blob=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='grocery-list-'+new Date().toISOString().split('T')[0]+'.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

function addMealFromRecipe(id){
  const r=S.recipes.find(r=>r.id===id);if(!r)return;
  const today=new Date().toISOString().split('T')[0];
  S.meals.push({id:'m'+Date.now(),name:r.name,type:'Dinner',date:today,ingredients:r.ingredients,steps:r.steps,prepTime:r.prepTime,serves:r.serves});
  S.mealTab='planner';
  renderPage();
  alert(r.name+' added to your meal plan!');
}

  const cats={};S.expenses.forEach(x=>{cats[x.category]=(cats[x.category]||0)+x.amount});

function kidMyDay(){
  const u=S.currentUser;
  const allTasks=S.tasks.filter(t=>t.assignee===u.name);
  const todayEvents=S.events.filter(e=>e.assignee===u.name);
  const pts=userPoints(u.name);
  const total=allTasks.length;
  const done=allTasks.filter(t=>t.done).length;
  const pct=total?Math.round(done/total*100):0;
  const morning=allTasks.filter(t=>t.timeOfDay==='Morning');
  const evening=allTasks.filter(t=>t.timeOfDay==='Evening');
  const anytime=allTasks.filter(t=>!t.timeOfDay||t.timeOfDay==='Any Time'||t.timeOfDay==='Chores');
  const hour=new Date().getHours();
  const greeting=hour<12?'Good morning':hour<17?'Good afternoon':'Good evening';
  const greetEmoji=hour<12?'☀️':hour<17?'🌤':'🌙';

  const recurBadge=(t)=>{
    if(!t.recur||t.recur==='none') return '';
    const labels={daily:'🔁 Daily',weekly:'🔁 Weekly',monthly:'🔁 Monthly',custom:'🔁 '+t.recurDays};
    return `<span style="font-size:10px;background:${u.bg};color:${u.accent};padding:1px 7px;border-radius:99px;font-weight:600;margin-left:6px">${labels[t.recur]||''}</span>`;
  };

  const taskRow=(t)=>`
    <div style="display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:16px;padding:14px 18px;margin-bottom:10px;border:0.5px solid ${t.done?'#9FE1CB':'#f0d0c0'}">
      <div style="display:flex;align-items:center;gap:14px;flex:1;cursor:pointer" onclick="toggleTask('${t.id}')">
        <div style="width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;${t.done?`background:${u.accent};border:none`:`background:#fff;border:2.5px solid ${u.accent}`}">
          ${t.done?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`:''}
        </div>
        <div>
          <div style="font-size:15px;font-weight:500;${t.done?'text-decoration:line-through;color:#aaa':''}">${t.title}${recurBadge(t)}</div>
          ${t.isChore?`<div style="font-size:12px;color:${u.accent};margin-top:2px;font-weight:500">${t.points} pts</div>`:''}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${t.done?`<div style="font-size:20px">⭐</div>`:''}
        ${t.addedBy===u.name?`<button onclick="deleteKidTask('${t.id}')" style="width:24px;height:24px;border-radius:50%;background:#FCEBEB;border:none;cursor:pointer;color:#A32D2D;font-size:14px;display:flex;align-items:center;justify-content:center">×</button>`:''}
      </div>
    </div>`;

  const section=(label,icon,items,color)=>items.length?`
    <div style="display:flex;align-items:center;gap:8px;margin:18px 0 10px">
      <div style="width:30px;height:30px;border-radius:50%;background:${color}22;display:flex;align-items:center;justify-content:center;font-size:16px">${icon}</div>
      <span style="font-size:13px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.05em">${label}</span>
      <span style="font-size:12px;color:#aaa;margin-left:4px">${items.filter(t=>t.done).length}/${items.length}</span>
    </div>
    ${items.map(taskRow).join('')}`:'';

  return`
  <div style="background:${u.bg};border-radius:20px;padding:20px 22px;margin-bottom:20px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-size:22px;font-weight:700;color:${u.color}">${greeting}, ${u.name}! ${greetEmoji}</div>
        <div style="font-size:14px;color:${u.color};opacity:0.75;margin-top:4px">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
      </div>
      <div style="text-align:center;background:#fff;border-radius:14px;padding:10px 16px">
        <div style="font-size:26px;font-weight:700;color:${u.accent}">${pts}</div>
        <div style="font-size:11px;color:#888;font-weight:500">points</div>
      </div>
    </div>
    <div style="margin-top:16px">
      <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:${u.color};margin-bottom:6px">
        <span>Today's Progress</span><span>${done}/${total} tasks</span>
      </div>
      <div style="height:14px;background:rgba(255,255,255,0.45);border-radius:99px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${u.accent};border-radius:99px;transition:width 0.5s"></div>
      </div>
    </div>

function selectHabitColor(color){
  document.querySelectorAll('#kh-colors [data-color]').forEach(el=>{
    const isThis=el.getAttribute('data-color')===color;
    el.style.border=isThis?'3px solid #1a1a1a':'3px solid transparent';
    el.setAttribute('data-sel',isThis?'1':'0');
  });
}

function saveKidHabit(){
  const u=S.currentUser;
  const name=document.getElementById('kh-name').value.trim();
  if(!name)return;
  const colorEl=document.querySelector('#kh-colors [data-sel="1"]');
  const color=colorEl?colorEl.getAttribute('data-color'):'#D85A30';
  S.habits.push({id:'h'+Date.now(),name,streak:0,color,owner:u.name,days:[0,0,0,0,0,0,0],addedBy:u.name});
  closeModal();renderPage();
}

function deleteKidHabit(id){
  const h=S.habits.find(h=>h.id===id);
  if(h&&h.addedBy===S.currentUser.name){S.habits.splice(S.habits.indexOf(h),1);renderPage();}
}

function selectTOD(val){
  ['Morning','Evening','Any-Time'].forEach(v=>{
    const el=document.getElementById('kt-tod-'+v);
    if(!el)return;
    const u=S.currentUser;
    const active=v===val.replace(' ','-');
    el.style.borderColor=active?u.accent:'#f0d0c0';
    el.style.background=active?u.bg:'#fff';
    el.style.color=active?u.accent:'#666';
    el.setAttribute('data-selected',active?'1':'0');
  });
}

function toggleDayBtn(el,day){

  mb.innerHTML=kidTaskModalHTML(null);
}

function openKidEditTask(id){
  const t=S.tasks.find(t=>t.id===id);
  if(!t)return;
  const bg=document.getElementById('modal-bg'),mb=document.getElementById('modal-body');
  bg.style.display='flex';
  mb.innerHTML=kidTaskModalHTML(t);
}

function saveKidTask(editId){
  const u=S.currentUser;
  const title=document.getElementById('kt-title').value.trim();
  if(!title)return;
  const todEls=['Morning','Evening','Any-Time'];
  let tod='Any Time';
  todEls.forEach(v=>{const el=document.getElementById('kt-tod-'+v);if(el&&el.getAttribute('data-selected')==='1')tod=v.replace('-',' ');});
  const recurSel=document.getElementById('kt-recur');
  const recur=recurSel?recurSel.value:'none';
  const dayBtns=document.querySelectorAll('[data-day][data-sel]');
  const recurDays=[];
  dayBtns.forEach(b=>{if(b.getAttribute('data-sel')==='1')recurDays.push(b.getAttribute('data-day'));});
  const isChore=document.getElementById('kt-chore').checked;
  const pts=isChore?parseInt(document.getElementById('kt-pts').value)||20:0;

  if(editId){
    const t=S.tasks.find(t=>t.id===editId);
    if(t){t.title=title;t.timeOfDay=tod;t.recur=recur;t.recurDays=recurDays;t.isChore=isChore;t.points=pts;}
  } else {
    S.tasks.push({id:'t'+Date.now(),title,assignee:u.name,timeOfDay:tod,recur,recurDays,isChore,points:pts,done:false,category:'Personal',addedBy:u.name});
  }
  closeModal();renderPage();
}

    <div style="grid-column:1/-1;background:#FCEBEB;border:0.5px solid #F09595;border-radius:12px;padding:14px;display:flex;align-items:center;gap:10px">
      <div style="width:36px;height:36px;border-radius:50%;background:#E24B4A;display:flex;align-items:center;justify-content:center;flex-shrink:0">${ic('alert',16)}</div>
      <div><div style="font-size:13px;font-weight:600;color:#A32D2D">Emergency Contacts — Bali, Indonesia</div><div style="font-size:12px;color:#A32D2D;margin-top:2px">Save these before you go offline</div></div>
    </div>
    ${[
      {label:'Hospital',icon:'🏥',val:S.travel.emergency.hospital,color:'#D85A30'},
      {label:'Ambulance',icon:'🚑',val:'Call: '+S.travel.emergency.ambulance,color:'#E24B4A'},
      {label:'Police',icon:'👮',val:'Call: '+S.travel.emergency.police,color:'#185FA5'},
      {label:'Embassy',icon:'🏛',val:S.travel.emergency.embassy,color:'#534AB7'},
      {label:'Transport',icon:'🚖',val:S.travel.emergency.transport,color:'#0F6E56'},
      {label:'Currency',icon:'💱',val:S.travel.emergency.currency,color:'#BA7517'},
      {label:'Language',icon:'🗣',val:S.travel.emergency.language,color:'#D4537E'}
    ].map(e=>`<div class="card">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="width:34px;height:34px;border-radius:50%;background:${e.color}18;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${e.icon}</div>
        <div><div style="font-size:12px;font-weight:600;color:#888;margin-bottom:3px">${e.label}</div><div style="font-size:13px;color:#1a1a1a">${e.val}</div></div>
      </div>
    </div>`).join('')}
    <div class="card" style="grid-column:1/-1;background:#E1F5EE;border-color:#9FE1CB">
      <div style="font-size:13px;font-weight:600;color:#085041;margin-bottom:8px">Quick Phrase Translator — Bahasa Indonesia</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        ${[['Hello','Halo'],['Thank you','Terima kasih'],['Help!','Tolong!'],['Where is...?','Di mana...?'],['How much?','Berapa harganya?'],['Hospital','Rumah sakit'],['Police','Polisi'],['I need a doctor','Saya perlu dokter'],['Emergency','Darurat']].map(([en,id])=>`<div style="background:#fff;border-radius:8px;padding:8px 10px;text-align:center"><div style="font-size:12px;font-weight:600;color:#085041">${en}</div><div style="font-size:12px;color:#1D9E75;margin-top:2px">${id}</div></div>`).join('')}
      </div>
    </div>
  </div>`;

  return`
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:12px">
    <div>
      <div style="font-size:20px;font-weight:600">${ic('plane',18)} ${T.tripName}</div>
      <div style="font-size:13px;color:#888;margin-top:3px">${T.destination} · ${T.dates}</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <div style="background:#fff;border:0.5px solid #f0d0c0;border-radius:10px;padding:8px 14px;text-align:center">
        <div style="font-size:16px;font-weight:600;color:#D85A30">${T.itinerary.length}</div>
        <div style="font-size:11px;color:#888">Activities</div>
      </div>
      <div style="background:#fff;border:0.5px solid #f0d0c0;border-radius:10px;padding:8px 14px;text-align:center">
        <div style="font-size:16px;font-weight:600;color:#0F6E56">${T.bookings.length}</div>
        <div style="font-size:11px;color:#888">Bookings</div>
      </div>
      <div style="background:#fff;border:0.5px solid #f0d0c0;border-radius:10px;padding:8px 14px;text-align:center">
        <div style="font-size:16px;font-weight:600;color:#BA7517">$${T.budget.toLocaleString()}</div>
        <div style="font-size:11px;color:#888">Budget</div>
      </div>
    </div>
  </div>
  ${tabBar()}
  ${S.travelTab==='itinerary'?itineraryTab():S.travelTab==='bookings'?bookingsTab():S.travelTab==='bucketlist'?bucketTab():S.travelTab==='map'?mapTab():S.travelTab==='expenses'?expensesTab():S.travelTab==='packing'?packingTab():emergencyTab()}`;
}

function toggleItinerary(id){const i=S.travel.itinerary.find(x=>x.id===id);if(i)i.done=!i.done;renderPage();}
function toggleBucketLike(id){const b=S.travel.bucketList.find(x=>x.id===id);if(!b)return;const u=S.currentUser.name;b.liked.includes(u)?b.liked.splice(b.liked.indexOf(u),1):b.liked.push(u);renderPage();}
function toggleBucketDone(id){const b=S.travel.bucketList.find(x=>x.id===id);if(b)b.done=!b.done;renderPage();}
function togglePacking(id){const p=S.travel.packing.find(x=>x.id===id);if(p)p.packed=!p.packed;renderPage();}
function addItineraryItem(){
  const bg=document.getElementById('modal-bg'),mb=document.getElementById('modal-body');
  bg.style.display='flex';
  mb.innerHTML=`<h3>Add Activity</h3>
  <div class="fi"><label>Title</label><input type="text" id="it-t" placeholder="e.g. Waterbom Bali"></div>
  <div class="frow"><div class="fi"><label>Day</label><input type="text" id="it-d" placeholder="e.g. Jul 8"></div><div class="fi"><label>Time</label><input type="text" id="it-ti" placeholder="e.g. 10:00 AM"></div></div>
  <div class="fi"><label>Type</label><select id="it-ty"><option>activity</option><option>attraction</option><option>restaurant</option><option>flight</option><option>hotel</option><option>car</option></select></div>
  <div class="fi"><label>Notes</label><input type="text" id="it-n" placeholder="e.g. Bring cash"></div>
  <div class="ma"><button onclick="closeModal()" style="padding:8px 16px;border-radius:10px;border:0.5px solid #d0c0b0;background:transparent;cursor:pointer;font-size:13px">Cancel</button><button class="btn b-orange" onclick="saveItineraryItem()">Add</button></div>`;
}
function saveItineraryItem(){
  const t=document.getElementById('it-t').value.trim();if(!t)return;
  S.travel.itinerary.push({id:'i'+Date.now(),day:document.getElementById('it-d').value,time:document.getElementById('it-ti').value,title:t,type:document.getElementById('it-ty').value,notes:document.getElementById('it-n').value,assignee:'All',done:false});
  closeModal();renderPage();
}
function addBucketItem(){
  const bg=document.getElementById('modal-bg'),mb=document.getElementById('modal-body');
  bg.style.display='flex';
  mb.innerHTML=`<h3>Add to Bucket List</h3>
  <div class="fi"><label>What's the wish?</label><input type="text" id="bl-t" placeholder="e.g. Mount Batur sunrise hike"></div>
  <div class="fi"><label>Category</label><select id="bl-c"><option>Adventure</option><option>Food</option><option>Culture</option><option>Kids</option><option>Nature</option><option>Other</option></select></div>
  <div class="ma"><button onclick="closeModal()" style="padding:8px 16px;border-radius:10px;border:0.5px solid #d0c0b0;background:transparent;cursor:pointer;font-size:13px">Cancel</button><button class="btn b-orange" onclick="saveBucketItem()">Add</button></div>`;
}
function saveBucketItem(){
  const t=document.getElementById('bl-t').value.trim();if(!t)return;
  S.travel.bucketList.push({id:'bl'+Date.now(),title:t,category:document.getElementById('bl-c').value,addedBy:S.currentUser.name,liked:[S.currentUser.name],done:false});
  closeModal();renderPage();
}
function addTravelExpense(){
  const bg=document.getElementById('modal-bg'),mb=document.getElementById('modal-body');
  bg.style.display='flex';
  mb.innerHTML=`<h3>Log Travel Expense</h3>
  <div class="fi"><label>Description</label><input type="text" id="te-t" placeholder="e.g. Dinner at Ku De Ta"></div>
  <div class="frow"><div class="fi"><label>Amount ($)</label><input type="number" id="te-a" placeholder="0.00" step="0.01"></div><div class="fi"><label>Paid By</label><select id="te-p">${USERS.map(u=>`<option>${u.name}</option>`).join('')}</select></div></div>
  <div class="fi"><label>Category</label><select id="te-c"><option>Food</option><option>Transport</option><option>Accommodation</option><option>Activities</option><option>Shopping</option><option>Other</option></select></div>
  <div class="ma"><button onclick="closeModal()" style="padding:8px 16px;border-radius:10px;border:0.5px solid #d0c0b0;background:transparent;cursor:pointer;font-size:13px">Cancel</button><button class="btn b-orange" onclick="saveTravelExpense()">Log</button></div>`;
}
function saveTravelExpense(){
  const t=document.getElementById('te-t').value.trim(),a=parseFloat(document.getElementById('te-a').value);if(!t||isNaN(a))return;
  S.travel.expenses.push({id:'te'+Date.now(),desc:t,amount:a,paidBy:document.getElementById('te-p').value,date:new Date().toISOString().split('T')[0],category:document.getElementById('te-c').value,split:'Family'});
  S.travel.spent+=a;closeModal();renderPage();
}
function addPackingItem(){
  const bg=document.getElementById('modal-bg'),mb=document.getElementById('modal-body');
  bg.style.display='flex';
  mb.innerHTML=`<h3>Add Packing Item</h3>
  <div class="fi"><label>Item</label><input type="text" id="pk-t" placeholder="e.g. Sunglasses"></div>
  <div class="frow"><div class="fi"><label>Category</label><select id="pk-c"><option>Documents</option><option>Health</option><option>Clothing</option><option>Electronics</option><option>Kids</option><option>Other</option></select></div><div class="fi"><label>For</label><select id="pk-w">${['All',...USERS.map(u=>u.name)].map(n=>`<option>${n}</option>`).join('')}</select></div></div>
  <div class="ma"><button onclick="closeModal()" style="padding:8px 16px;border-radius:10px;border:0.5px solid #d0c0b0;background:transparent;cursor:pointer;font-size:13px">Cancel</button><button class="btn b-orange" onclick="savePackingItem()">Add</button></div>`;
}
function savePackingItem(){
  const t=document.getElementById('pk-t').value.trim();if(!t)return;
  S.travel.packing.push({id:'pk'+Date.now(),item:t,category:document.getElementById('pk-c').value,packed:false,who:document.getElementById('pk-w').value});
  closeModal();renderPage();
}

applyTheme();
renderNav();
renderSidebarUser();
renderPage();
</script>
</body>
</html>
